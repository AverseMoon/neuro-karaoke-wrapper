<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .splash {
    position: relative;
    width: 100%;
    height: 100%;
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px;
    background: linear-gradient(135deg, #00838f 0%, #8e1a1a 50%, #7b1fa2 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    overflow: hidden;
  }

  .splash::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: inherit;
    filter: blur(30px);
    z-index: 0;
  }

  .splash > * {
    position: relative;
    z-index: 1;
  }

  .loading-img {
    width: 150px;
    height: 150px;
    object-fit: contain;
    border-radius: 8px;
  }

  .status-text {
    color: #fff;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }

  .progress-container {
    width: 70%;
    height: 6px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 3px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .progress-container.visible {
    opacity: 1;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 3px;
    transition: width 0.2s ease;
  }
</style>
</head>
<body>
<div class="splash">
  <img class="loading-img" id="loading-img" src="" alt="Loading..." />
  <div class="status-text" id="status-text">Checking for updates...</div>
  <div class="progress-container" id="progress-container">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</div>
<script>
  const { ipcRenderer } = require('electron');

  ipcRenderer.on('splash-loading-url', (_event, url) => {
    document.getElementById('loading-img').src = url;
  });

  ipcRenderer.on('splash-status', (_event, text) => {
    document.getElementById('status-text').textContent = text;
  });

  ipcRenderer.on('splash-progress', (_event, percent) => {
    const container = document.getElementById('progress-container');
    const bar = document.getElementById('progress-bar');
    if (percent >= 0) {
      container.classList.add('visible');
      bar.style.width = percent + '%';
    } else {
      container.classList.remove('visible');
      bar.style.width = '0%';
    }
  });
</script>
</body>
</html>
